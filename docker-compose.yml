version: "3.8"

services:
  # 1. Database Relasional (RDBMS)
  rdbms:
    image: postgres:15-alpine
    container_name: test-rdbms
    environment:
      POSTGRES_USER: backend_user
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: siem_db
    ports:
      - "5432:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - siem-network

  # 2. Elasticsearch (ES)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.2
    container_name: test-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - siem-network

  # 3. Otomasi Inject Data Ke ES
  es-initializer:
    image: curlimages/curl:latest
    container_name: test-es-initializer
    depends_on:
      - elasticsearch
    volumes:
      - ./init-es:/scripts
    entrypoint: ["sh", "/scripts/setup-es.sh"]
    networks:
      - siem-network

  # 4. Backend Service
  backend:
    build: .
    container_name: siem-backend
    image: siem-backend-pgi
    depends_on:
      - rdbms
      - elasticsearch
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - PG_CONNECTION_STRING=postgres://backend_user:secretpassword@rdbms:5432/siem_db
      - DATABASE_URL=postgresql://backend_user:secretpassword@rdbms:5432/siem_db?schema=public
      - ES_NODE=http://elasticsearch:9200
    command: sh -c "npx prisma db push && node dist/src/server.js"
    networks:
      - siem-network

networks:
  siem-network:
    driver: bridge
